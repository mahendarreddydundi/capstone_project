<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows Hello Fingerprint Demo</title>
    <style>
      :root {
        --bg: #f6f8f7;
        --card: #ffffff;
        --text: #12201a;
        --accent: #0f766e;
        --muted: #4b6359;
        --danger: #b42318;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        background: radial-gradient(circle at top left, #dcfce7, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border-radius: 14px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.07);
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      input {
        flex: 1;
        min-width: 220px;
        border: 1px solid #c7d9ce;
        border-radius: 10px;
        font-size: 16px;
        padding: 10px 12px;
      }
      button {
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
      }
      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
      }
      pre {
        margin-top: 16px;
        background: #0b1f17;
        color: #cfffe7;
        border-radius: 10px;
        padding: 12px;
        min-height: 90px;
        white-space: pre-wrap;
      }
      .error { color: var(--danger); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Windows Hello Fingerprint via WebAuthn</h1>
        <p>
          This uses your laptop's Windows Hello flow. Browser prompts fingerprint/PIN/face.
          Raw fingerprint image is never exposed.
        </p>

        <div class="row">
          <input id="username" placeholder="Enter username (e.g., demo_user)" />
        </div>

        <div class="actions">
          <button id="registerBtn">Register Fingerprint Credential</button>
          <button id="authBtn">Authenticate Login</button>
        </div>

        <pre id="log"></pre>
      </div>
    </div>

    <script>
      const logEl = document.getElementById('log');
      const usernameEl = document.getElementById('username');

      const log = (msg, isErr = false) => {
        logEl.textContent = `${isErr ? 'ERROR: ' : ''}${msg}`;
        if (isErr) logEl.classList.add('error');
        else logEl.classList.remove('error');
      };

      const base64urlToBuffer = (b64url) => {
        const pad = '='.repeat((4 - (b64url.length % 4)) % 4);
        const base64 = (b64url + pad).replace(/-/g, '+').replace(/_/g, '/');
        const raw = atob(base64);
        return Uint8Array.from([...raw].map((c) => c.charCodeAt(0))).buffer;
      };

      const bufferToBase64url = (buf) => {
        const bytes = new Uint8Array(buf);
        let str = '';
        bytes.forEach((b) => (str += String.fromCharCode(b)));
        return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      };

      async function post(url, body) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        return res.json();
      }

      async function register() {
        const username = usernameEl.value.trim();
        if (!username) return log('Username is required', true);

        const opts = await post('/webauthn/register/options', { username });
        if (opts.error) return log(opts.error, true);

        opts.challenge = base64urlToBuffer(opts.challenge);
        opts.user.id = base64urlToBuffer(opts.user.id);
        if (Array.isArray(opts.excludeCredentials)) {
          opts.excludeCredentials = opts.excludeCredentials.map((c) => ({
            ...c,
            id: base64urlToBuffer(c.id),
          }));
        }

        const cred = await navigator.credentials.create({ publicKey: opts });
        const payload = {
          id: cred.id,
          rawId: bufferToBase64url(cred.rawId),
          type: cred.type,
          response: {
            attestationObject: bufferToBase64url(cred.response.attestationObject),
            clientDataJSON: bufferToBase64url(cred.response.clientDataJSON),
            transports: cred.response.getTransports ? cred.response.getTransports() : [],
          },
          clientExtensionResults: cred.getClientExtensionResults(),
        };

        const verify = await post('/webauthn/register/verify', { username, response: payload });
        if (verify.verified) {
          log(`Registration successful. Credentials stored: ${verify.deviceCount}`);
        } else {
          log(verify.error || 'Registration failed', true);
        }
      }

      async function authenticate() {
        const username = usernameEl.value.trim();
        if (!username) return log('Username is required', true);

        const opts = await post('/webauthn/auth/options', { username });
        if (opts.error) return log(opts.error, true);

        opts.challenge = base64urlToBuffer(opts.challenge);
        if (Array.isArray(opts.allowCredentials)) {
          opts.allowCredentials = opts.allowCredentials.map((c) => ({
            ...c,
            id: base64urlToBuffer(c.id),
          }));
        }

        const assertion = await navigator.credentials.get({ publicKey: opts });
        const payload = {
          id: assertion.id,
          rawId: bufferToBase64url(assertion.rawId),
          type: assertion.type,
          response: {
            authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
            clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
            signature: bufferToBase64url(assertion.response.signature),
            userHandle: assertion.response.userHandle
              ? bufferToBase64url(assertion.response.userHandle)
              : null,
          },
          clientExtensionResults: assertion.getClientExtensionResults(),
        };

        const verify = await post('/webauthn/auth/verify', { username, response: payload });
        if (verify.verified) {
          log('Authentication verified using Windows Hello');
        } else {
          log(verify.error || 'Authentication failed', true);
        }
      }

      document.getElementById('registerBtn').addEventListener('click', register);
      document.getElementById('authBtn').addEventListener('click', authenticate);
    </script>
  </body>
</html>
